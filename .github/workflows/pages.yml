name: Deploy public site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://nxfdxhixvgogxjenrfhr.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54ZmR4aGl4dmdvZ3hqZW5yZmhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NTMyODYsImV4cCI6MjA5NjIyOTI4Nn0.6hz-tg7lHFoOuWwu9cWee-e1iy-AiEQmU8bmH11BAxs
          VITE_PUBLIC_DOMAIN: regaleriashop.com
          VITE_INTERNAL_DOMAIN: sistema.regaleriashop.com
          VITE_INTERNAL_ALLOWED_EMAILS: josias.insfran66@gmail.com

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
